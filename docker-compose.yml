# Self-hosted Support Tool — full stack: Postgres + app + background worker.
#
#   1. cp .env.example .env   (set APP_SECRET + NEXT_PUBLIC_APP_URL; optional SMTP)
#   2. docker compose up -d
#
# The one-shot `migrate` service runs DB migrations + seeds before app/worker start.

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: support
      POSTGRES_PASSWORD: support
      POSTGRES_DB: support_tool
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U support -d support_tool"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    image: support-tool:latest
    command: pnpm setup
    env_file: .env
    environment:
      DATABASE_URL: postgresql://support:support@postgres:5432/support_tool
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build: .
    image: support-tool:latest
    command: pnpm start
    env_file: .env
    environment:
      DATABASE_URL: postgresql://support:support@postgres:5432/support_tool
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    build: .
    image: support-tool:latest
    command: pnpm worker:start
    env_file: .env
    environment:
      DATABASE_URL: postgresql://support:support@postgres:5432/support_tool
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
